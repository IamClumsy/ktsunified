name: Socket Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  socket:
    name: Socket.dev supply chain scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Socket Security
        uses: SocketDev/action@v1.3.2
        with:
          api-key: ${{ secrets.SOCKET_SECURITY_API_KEY }}
