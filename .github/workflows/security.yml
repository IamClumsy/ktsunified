name: Security Scans

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 0 * * 1" # Weekly Monday scan

jobs:
  # ── TruffleHog — secrets detection ──────────────────────────────────────────
  trufflehog:
    name: TruffleHog (secrets)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run TruffleHog
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified

  # ── Bandit — Python static analysis ─────────────────────────────────────────
  bandit:
    name: Bandit (Python)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Bandit
        run: pip install bandit[toml]

      - name: Run Bandit
        run: |
          bandit -r . \
            --exclude ./.git,./node_modules,./.next \
            --severity-level medium \
            --confidence-level medium \
            -f txt

  # ── OSV Scanner — dependency vulnerabilities ─────────────────────────────────
  osv-scanner:
    name: OSV Scanner (dependencies)
    permissions:
      security-events: write
      contents: read
      actions: read
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@3adb4b14a2b0623876d18d863a498b785fb3752d # v2.3.8
    with:
      scan-args: |-
        --lockfile=package-lock.json
        -r
        ./
      # xlsx has known unfixed CVEs — already triaged, don't fail the build
      fail-on-vuln: false
